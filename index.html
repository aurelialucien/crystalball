<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crystal Ball v2.0</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="version-tag">v2.0</div>

<div class="scene">
  <div class="glow-ring"></div>

  <div class="crystal-ball">
    <div class="glass-highlight"></div>

    <div class="heart-layer">
      <div class="heart h1">💗</div>
      <div class="heart h2">💗</div>
      <div class="heart h3">💗</div>
      <div class="heart h4">💗</div>
      <div class="heart h5">💗</div>
      <div class="heart h6">💗</div>
    </div>

    <div class="sparkles"></div>
  </div>

  <div class="pedestal">
    <div class="pedestal-top"></div>
    <div class="pedestal-body"></div>
    <div class="pedestal-base"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
