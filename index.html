<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

  <meta name="theme-color" content="#130926">

<body>

  <main class="scene" aria-label="Crystal ball">

      <div class="orb-glow"></div>
      <div class="glass-highlight"></div>
      <div class="glass-rim"></div>
      <div class="heart h1">💗</div>

      <div class="pedestal-top"></div>
      <div class="pedestal-body"></div>
      <div class="pedestal-base"></div>
    </div>
